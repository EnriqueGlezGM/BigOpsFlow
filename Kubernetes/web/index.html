<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Delivery Predict</title>
  <style>
    :root {
      --bg: #0b1021;
      --card: #0f172a;
      --card2: #101b33;
      --accent: #22c55e;
      --accent-2: #00c2ff;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --error: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 32px;
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 20%, rgba(0,194,255,0.14), transparent 25%),
        radial-gradient(circle at 90% 10%, rgba(34,197,94,0.15), transparent 20%),
        radial-gradient(circle at 60% 80%, rgba(255,255,255,0.06), transparent 35%),
        linear-gradient(135deg, #0b1021 0%, #0c1225 50%, #0b142a 100%);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
    }
    h1 { margin: 0 0 8px; letter-spacing: 0.5px; }
    p { margin: 4px 0 16px; color: var(--muted); max-width: 960px; }
    .card {
      max-width: 1100px;
      margin: 0 auto;
      background: linear-gradient(145deg, var(--card), var(--card2));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 80px rgba(0,0,0,0.45);
    }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 13px; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(34,197,94,0.3); }
    .grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .row { margin-bottom: 14px; }
    button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b111f;
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(34,197,94,0.25); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
      color: var(--muted);
      white-space: pre-wrap;
    }
    .error { color: var(--error); }
    .muted { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .result-card {
      padding: 20px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(34,197,94,0.12);
      color: var(--accent);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    .prediction-value {
      font-size: 46px;
      font-weight: 800;
      color: #ffffff;
      margin: 4px 0 0;
    }
    .subtle-box {
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      font-family: "SFMono-Regular", Consolas, Menlo, monospace;
      font-size: 13px;
      color: var(--muted);
      word-break: break-all;
      min-height: 80px;
    }
    .uuid-box {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .uuid-value {
      font-family: "SFMono-Regular", Consolas, Menlo, monospace;
      font-size: 13px;
      color: #cbd5e1;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Food Delivery Predict</h1>
    <p>Envía un evento a <code>http://localhost:5050/predict-sync</code> y recibe la predicción al vuelo. El UUID se genera automáticamente en cada envío.</p>

    <div class="layout">
      <div>
        <form id="predictForm">
          <div class="grid">
            <div>
              <label for="customer_id">customer_id</label>
              <input id="customer_id" type="text" value="c1" required />
            </div>
            <div>
              <label for="restaurant_id">restaurant_id</label>
              <input id="restaurant_id" type="text" value="r1" required />
            </div>
            <div>
              <label for="order_date_and_time">order_date_and_time</label>
              <input id="order_date_and_time" type="datetime-local" value="2024-05-10T12:34" required />
            </div>
            <div>
              <label for="order_value">order_value</label>
              <input id="order_value" type="number" step="0.01" value="25.5" required />
            </div>
            <div>
              <label for="delivery_fee">delivery_fee</label>
              <input id="delivery_fee" type="number" step="0.01" value="3.0" required />
            </div>
            <div>
              <label for="payment_method">payment_method</label>
              <select id="payment_method">
                <option value="card" selected>card</option>
                <option value="cash">cash</option>
                <option value="wallet">wallet</option>
                <option value="">(empty)</option>
              </select>
            </div>
            <div>
              <label for="discounts_and_offers">discounts_and_offers</label>
              <input id="discounts_and_offers" type="text" placeholder="e.g. SUMMER10" />
            </div>
            <div>
              <label for="commission_fee">commission_fee</label>
              <input id="commission_fee" type="number" step="0.01" value="2.0" required />
            </div>
            <div>
              <label for="payment_processing_fee">payment_processing_fee</label>
              <input id="payment_processing_fee" type="number" step="0.01" value="0.5" required />
            </div>
            <div>
              <label for="refunds_chargebacks">refunds/chargebacks</label>
              <input id="refunds_chargebacks" type="number" step="0.01" value="0.1" required />
            </div>
          </div>
          <input id="UUID" type="hidden" />

          <div class="row" style="margin-top:16px;">
            <button type="submit" id="sendBtn" disabled>Enviar y predecir</button>
          </div>
        </form>
        <div id="status" class="status">Esperando análisis (Spark)...</div>
      </div>

      <div class="result-card">
        <span class="pill">Predicción</span>
        <div id="predictionValue" class="prediction-value">--</div>
        <div class="uuid-box">
          <span class="muted">UUID:</span> <span id="uuidLabel" class="uuid-value">--</span>
        </div>
        <div class="subtle-box" id="payloadBox">{ }</div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("predictForm");
    const uuidInput = document.getElementById("UUID");
    const statusBox = document.getElementById("status");
    const sendButton = document.querySelector("button[type='submit']");
    const predictBase = (() => {
      try {
        const url = new URL(window.location.href);
        return `${url.protocol}//${url.hostname}:5050`;
      } catch (e) {
        return "http://localhost:5050";
      }
    })();
    const predictUrl = `${predictBase}/predict-sync`;

    const genUuid = () =>
      "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === "x" ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    const setUuid = () => { uuidInput.value = genUuid(); };
    setUuid();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      sendButton.disabled = true;
      const prevBtnText = sendButton.textContent;
      sendButton.textContent = "Enviando...";
      statusBox.innerHTML = '<span class="spinner"></span>Enviando...';

      const dateValue = document.getElementById("order_date_and_time").value;
      const isoDate = dateValue ? new Date(dateValue).toISOString() : null;

      const payload = {
        UUID: uuidInput.value || genUuid(),
        customer_id: document.getElementById("customer_id").value || "",
        restaurant_id: document.getElementById("restaurant_id").value || "",
        order_date_and_time: isoDate,
        order_value: Number(document.getElementById("order_value").value) || 0,
        delivery_fee: Number(document.getElementById("delivery_fee").value) || 0,
        payment_method: document.getElementById("payment_method").value || null,
        discounts_and_offers: document.getElementById("discounts_and_offers").value || null,
        commission_fee: Number(document.getElementById("commission_fee").value) || 0,
        payment_processing_fee: Number(document.getElementById("payment_processing_fee").value) || 0,
        "refunds/chargebacks": Number(document.getElementById("refunds_chargebacks").value) || 0,
      };

      try {
        const res = await fetch(predictUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        const pred = data?.prediction ?? data?.result?.prediction;
        document.getElementById("predictionValue").textContent =
          pred !== undefined ? pred : "--";
        document.getElementById("uuidLabel").textContent = payload.UUID;
        document.getElementById("payloadBox").textContent = JSON.stringify(data, null, 2);
        setUuid(); // prepara la siguiente solicitud
        statusBox.textContent = "Completado.";
      } catch (err) {
        document.getElementById("predictionValue").textContent = "--";
        document.getElementById("uuidLabel").textContent = "error";
        document.getElementById("payloadBox").textContent = `Error: ${err}`;
        statusBox.textContent = `Error: ${err}`;
      } finally {
        sendButton.disabled = false;
        sendButton.textContent = prevBtnText;
      }
    });

    async function checkReady() {
      try {
        const res = await fetch(`${predictBase}/ready`, { method: "GET" });
        if (res.ok) {
          const data = await res.json();
          if (data.ok) {
            statusBox.textContent = "Job analysis en ejecución. Puedes enviar.";
            sendButton.disabled = false;
            return;
          }
        }
      } catch (e) {
        statusBox.innerHTML = '<span class="spinner"></span>Esperando análisis (Spark)...';
      }
      sendButton.disabled = true;
      statusBox.innerHTML = '<span class="spinner"></span>Esperando análisis (Spark)...';
      setTimeout(checkReady, 2000);
    }
    sendButton.disabled = true;
    statusBox.innerHTML = '<span class="spinner"></span>Esperando análisis (Spark)...';
    checkReady();
  </script>
</body>
</html>
