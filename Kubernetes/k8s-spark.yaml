apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: spark
  labels: { app: kibana }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: kibana } }
  template:
    metadata: { labels: { app: kibana } }
    spec:
      terminationGracePeriodSeconds: 10
      initContainers:
        - name: wait-for-elastic
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh","-lc"]
          args:
            - >
              echo "[kibana-init] Waiting for Elasticsearch at http://elastic:9200 ..." ;
              until curl -sS http://elastic:9200/_cluster/health?wait_for_status=yellow&amp;timeout=1s >/dev/null; do
                echo "[kibana-init] still waiting..." ;
                sleep 3 ;
              done ;
              echo "[kibana-init] Elasticsearch is up."
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:9.1.2
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
          ports:
            - containerPort: 5601
          readinessProbe:
            httpGet: { path: /api/status, port: 5601 }
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/status, port: 5601 }
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "2Gi" }
          volumeMounts:
            - name: kibana-config
              mountPath: /usr/share/kibana/config/kibana.yml
              subPath: kibana.yml
      volumes:
        - name: kibana-config
          configMap: { name: kibana-config }
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: spark
spec:
  type: NodePort
  selector: { app: kibana }
  ports:
    - name: http
      port: 5601
      targetPort: 5601
      nodePort: 30601
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kibana-create-dataview
  namespace: spark
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: create-dataview
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          env:
            - name: KIBANA_URL
              value: http://kibana:5601
            - name: ES_URL
              value: http://elastic:9200
            - name: INDEX_PATTERN
              value: mydata_prediction_response*
            - name: DATA_VIEW_ID
              value: mydata_prediction_response
            - name: DATA_VIEW_NAME
              value: MyData Prediction
          command: ["/bin/sh","-lc"]
          args:
            - >
              set -e;
              echo "[dv] waiting for Kibana at $KIBANA_URL...";
              for i in $(seq 1 60); do
                if curl -sS "$KIBANA_URL/api/status" >/dev/null 2>&1; then
                  break;
                fi;
                echo "[dv] still waiting ($i)...";
                sleep 5;
              done;
              echo "[dv] creating data view id=$DATA_VIEW_ID title=$INDEX_PATTERN...";
              curl -sS -f -X POST "$KIBANA_URL/api/data_views/data_view" \
                -H 'kbn-xsrf: true' \
                -H 'Content-Type: application/json' \
                -d "{\"data_view\":{\"id\":\"$DATA_VIEW_ID\",\"title\":\"$INDEX_PATTERN\",\"name\":\"$DATA_VIEW_NAME\",\"timeFieldName\":\"@timestamp\"}}";
              echo "[dv] done.";
