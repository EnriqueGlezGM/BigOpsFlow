# Nota: Renderiza este fichero con envsubst para resolver solo ${BASE_DIR}, ej.:
#   BASE_DIR=$(pwd) envsubst '${BASE_DIR}' < k8s-spark.yaml | kubectl apply -f -
apiVersion: v1
kind: PersistentVolume
metadata:
  name: models-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: spark
    name: models-pvc
  hostPath:
    path: ${BASE_DIR}/models
    type: DirectoryOrCreate
---
apiVersion: v1
kind: Namespace
metadata:
  name: spark
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: spark
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeMode: Filesystem
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: spark
  labels: { app: spark, component: master }
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector: { matchLabels: { app: spark, component: master } }
  template:
    metadata: { labels: { app: spark, component: master } }
    spec:
      securityContext:
        fsGroup: 185
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-models
          image: busybox:1.36
          command: ["/bin/sh","-c"]
          args: ["mkdir -p /models /models/.pylibs /models/scripts && chown -R 185:185 /models || true && chmod -R 0777 /models || true"]
          volumeMounts:
            - name: models-vol
              mountPath: /models
      volumes:
        - name: models-vol
          persistentVolumeClaim:
            claimName: models-pvc
        - name: spark-work
          emptyDir: {}
      containers:
        - name: spark-master
          image: spark:4.0.1-py
          imagePullPolicy: IfNotPresent
          env:
            - name: SPARK_NO_DAEMONIZE
              value: "true"
            - name: SPARK_LOG_DIR
              value: /tmp
            - name: JAVA_HOME
              value: /opt/java/openjdk
            - name: PYSPARK_PYTHON
              value: /usr/bin/python3
            - name: PYSPARK_DRIVER_PYTHON
              value: /usr/bin/python3
            - name: SPARK_MASTER_HOST
              value: 0.0.0.0
            - name: SPARK_MASTER_PORT
              value: "7077"
            - name: SPARK_MASTER_WEBUI_PORT
              value: "8080"
            - name: SPARK_PUBLIC_DNS
              value: spark-master-svc
            - name: SPARK_PID_DIR
              value: /tmp
            - name: HADOOP_USER_NAME
              value: spark
            - name: SPARK_USER
              value: spark
          securityContext:
            runAsUser: 185
            runAsGroup: 185
          volumeMounts:
            - name: models-vol
              mountPath: /models
            - name: spark-work
              mountPath: /opt/spark/work
          args: ["/opt/spark/sbin/start-master.sh"]
          ports:
            - containerPort: 7077
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 7077 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: spark-master-svc
  namespace: spark
spec:
  type: NodePort
  selector: { app: spark, component: master }
  ports:
    - name: spark
      port: 7077
      targetPort: 7077
      nodePort: 30077
    - name: webui
      port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: spark
  labels: { app: spark, component: worker }
spec:
  replicas: 2
  selector: { matchLabels: { app: spark, component: worker } }
  template:
    metadata: { labels: { app: spark, component: worker } }
    spec:
      securityContext:
        fsGroup: 185
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-models
          image: busybox:1.36
          command: ["/bin/sh","-c"]
          args: ["mkdir -p /models /models/.pylibs /models/scripts && chown -R 185:185 /models || true && chmod -R 0777 /models || true"]
          volumeMounts:
            - name: models-vol
              mountPath: /models
      volumes:
        - name: models-vol
          persistentVolumeClaim:
            claimName: models-pvc
        - name: spark-work
          emptyDir: {}
      containers:
        - name: spark-worker
          image: spark:4.0.1-py
          imagePullPolicy: IfNotPresent
          env:
            - name: SPARK_NO_DAEMONIZE
              value: "true"
            - name: SPARK_LOG_DIR
              value: /tmp
            - name: JAVA_HOME
              value: /opt/java/openjdk
            - name: PYSPARK_PYTHON
              value: /usr/bin/python3
            - name: SPARK_WORKER_MEMORY
              value: 3g
            - name: SPARK_WORKER_CORES
              value: "2"
            - name: SPARK_PID_DIR
              value: /tmp
            - name: SPARK_WORKER_DIR
              value: /tmp/spark-worker
            - name: HADOOP_USER_NAME
              value: spark
            - name: SPARK_USER
              value: spark
          securityContext:
            runAsUser: 185
            runAsGroup: 185
          volumeMounts:
            - name: models-vol
              mountPath: /models
            - name: spark-work
              mountPath: /opt/spark/work
          args: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master-svc:7077"]
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet: { path: /, port: 8081 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: batch/v1
kind: Job
metadata:
  name: models-fix-perms
  namespace: spark
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: fixer
          image: busybox:1.36
          command: ["/bin/sh","-lc"]
          args:
            - >
              echo "[fixer] setting ownership and permissions..." &&
              chown -R 185:185 /models || true &&
              chmod -R 0777 /models || true &&
              mkdir -p /models/gbt /models/.pylibs /models/scripts &&
              chmod 0777 /models/gbt /models/.pylibs &&
              echo "[fixer] done."
          volumeMounts:
            - name: models-vol
              mountPath: /models
      volumes:
        - name: models-vol
          persistentVolumeClaim:
            claimName: models-pvc
---
apiVersion: batch/v1
kind: Job
metadata:
  name: spark-submit-train
  namespace: spark
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: submit
          image: spark:4.0.1-py
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: SPARK_LOCAL_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
          command: ["/bin/sh","-lc"]
          args:
            - >
              /opt/spark/bin/spark-submit
              --master spark://spark-master-svc:7077
              --conf spark.driver.bindAddress=0.0.0.0
              --conf spark.driver.host=$SPARK_LOCAL_IP
              --conf spark.driver.port=32001
              --conf spark.blockManager.port=32002
              --conf spark.ui.port=4041
              --conf spark.dynamicAllocation.enabled=false
              --conf spark.cores.max=2
              --conf spark.executor.cores=1
              --conf spark.executor.memory=2g
              --conf spark.executor.memoryOverhead=512m
              --conf spark.driver.memory=2g
              /code/train_gbt.py
              --data /models/data/dataset.csv
              --out  /models/gbt/pipeline_model
          volumeMounts:
            - name: models-vol
              mountPath: /models
            - name: models-vol
              mountPath: /code
              subPath: scripts
      volumes:
        - name: models-vol
          persistentVolumeClaim:
            claimName: models-pvc
---
