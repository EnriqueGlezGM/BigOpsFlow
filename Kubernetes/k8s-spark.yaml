apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-stream-predict
  namespace: spark
  labels: { app: spark, component: stream-predict }
spec:
  replicas: 1
  selector: { matchLabels: { app: spark, component: stream-predict } }
  template:
    metadata: { labels: { app: spark, component: stream-predict } }
    spec:
      securityContext:
        fsGroup: 185
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-models
          image: busybox:1.36
          command: ["/bin/sh","-c"]
          args: ["mkdir -p /models/gbt /models/checkpoints /models/.pylibs /models/.ivy2 /models/scripts && chown -R 185:185 /models || true && chmod -R 0777 /models || true"]
          volumeMounts:
            - name: models-vol
              mountPath: /models
        - name: wait-kafka
          image: busybox:1.36
          command: ["/bin/sh","-lc"]
          args:
            - >
              echo "[wait-kafka] Waiting for kafka:9092...";
              until nc -z -w 1 kafka 9092; do
                echo "[wait-kafka] still waiting...";
                sleep 2;
              done;
              echo "[wait-kafka] Kafka is reachable."
        - name: check-model
          image: busybox:1.36
          env:
            - name: MODEL_DIR
              value: "/models/gbt/pipeline_model"
          command: ["/bin/sh","-lc"]
          args:
            - >
              ALT="${MODEL_DIR%/*}/best_pipeline";
              TARGET="${MODEL_DIR}";
              echo "[check-model] waiting for model at $TARGET (alt $ALT)";
              echo "[check-model] model env MODEL_DIR=$MODEL_DIR";
              for i in $(seq 1 60); do
                if [ -d "$TARGET" ] || [ -d "$ALT" ]; then
                  if [ ! -d "$TARGET" ] && [ -d "$ALT" ]; then
                    echo "[check-model] creating symlink $TARGET -> $ALT";
                    ln -s "$ALT" "$TARGET" || true;
                  fi;
                  echo "[check-model] directory listing:";
                  ls -l "$TARGET" || true;
                  echo "[check-model] model ready.";
                  exit 0;
                fi;
                echo "[check-model] attempt $i/60: model not found yet, sleeping 5s...";
                sleep 5;
              done;
              echo "[check-model] ERROR: model not found after 5 minutes";
              echo "[check-model] Hint: ensure training has written the model to $TARGET or $ALT";
              exit 1;
          volumeMounts:
            - name: models-vol
              mountPath: /models
      volumes:
        - name: models-vol
          persistentVolumeClaim:
            claimName: models-pvc
      containers:
        - name: submit
          image: spark:4.0.1-py
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: SPARK_LOCAL_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: MODEL_DIR
              value: "/models/gbt/pipeline_model"
            - name: CHECKPOINT_DIR
              value: "/models/checkpoints/prediction-v1"
            - name: PYTHONPATH
              value: "/models/.pylibs"
            - name: SPARK_SUBMIT_OPTS
              value: "-Dspark.jars.ivy=/models/.ivy2 -Duser.home=/models"
            - name: HOME
              value: "/models"
            - name: IVY_HOME
              value: "/models/.ivy2"
            - name: JAVA_TOOL_OPTIONS
              value: "-Duser.home=/models"
            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"
            - name: REQUEST_TOPIC
              value: "mydata_prediction_request"
            - name: RESPONSE_TOPIC
              value: "mydata_prediction_response"
            - name: MONGO_URI
              value: "mongodb://mongo:27017"
            - name: MONGO_DB
              value: "agile_data_science"
            - name: MONGO_COLL
              value: "mydata_prediction_response"
            - name: ELASTIC_URL
              value: "http://elastic:9200"
            - name: ELASTIC_INDEX
              value: "mydata_prediction_response"
          command: ["/bin/sh","-lc"]
          args:
            - >
              python -m pip install --no-cache-dir -q -t /models/.pylibs kafka-python pymongo requests || echo '[WARN] pip failed';
              export PYTHONPATH=/models/.pylibs:$PYTHONPATH;
              echo "[submit] MODEL_DIR=$MODEL_DIR CHECKPOINT_DIR=$CHECKPOINT_DIR";
              echo "[submit] Starting spark-stream-predict...";
              /opt/spark/bin/spark-submit
              --master spark://spark-master-svc:7077
              --conf spark.driver.bindAddress=0.0.0.0
              --conf spark.driver.host=$SPARK_LOCAL_IP
              --conf spark.driver.port=32011
              --conf spark.blockManager.port=32012
              --conf spark.ui.port=4042
              --conf spark.dynamicAllocation.enabled=false
              --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.1,org.apache.spark:spark-token-provider-kafka-0-10_2.13:4.0.1
              --conf spark.cores.max=2
              --conf spark.executor.cores=1
              --conf spark.executor.memory=2g
              --conf spark.executor.memoryOverhead=512m
              --conf spark.driver.memory=2g
              --conf spark.executorEnv.PYTHONPATH=/models/.pylibs
              --conf spark.executorEnv.KAFKA_BOOTSTRAP=$KAFKA_BOOTSTRAP
              --conf spark.executorEnv.REQUEST_TOPIC=$REQUEST_TOPIC
              --conf spark.executorEnv.MONGO_URI=$MONGO_URI
              --conf spark.executorEnv.MONGO_DB=$MONGO_DB
              --conf spark.executorEnv.MONGO_COLL=$MONGO_COLL
              --conf spark.executorEnv.ELASTIC_URL=$ELASTIC_URL
              --conf spark.executorEnv.ELASTIC_INDEX=$ELASTIC_INDEX
              /code/prediction.py
          ports:
            - containerPort: 4042
            - containerPort: 32011
            - containerPort: 32012
          volumeMounts:
            - name: models-vol
              mountPath: /models
            - name: models-vol
              mountPath: /code
              subPath: scripts
          readinessProbe:
            tcpSocket: { port: 4042 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: spark-stream-predict
  namespace: spark
spec:
  type: NodePort
  selector: { app: spark, component: stream-predict }
  ports:
    - name: ui
      port: 4042
      targetPort: 4042
      nodePort: 30442
