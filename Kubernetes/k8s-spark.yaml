apiVersion: v1
kind: ConfigMap
metadata:
  name: ingest-app
  namespace: spark
data:
  app.py: |
    import os, json, time, urllib.request, urllib.error
    from uuid import uuid4
    from typing import Any, Dict, Optional
    from fastapi import FastAPI, HTTPException
    from fastapi.middleware.cors import CORSMiddleware
    from kafka import KafkaProducer, KafkaConsumer

    app = FastAPI()
    app.add_middleware(
        CORSMiddleware,
        allow_origins=["*"],
        allow_credentials=False,
        allow_methods=["*"],
        allow_headers=["*"],
    )
    BOOTSTRAP = os.getenv("KAFKA_BOOTSTRAP", "kafka:9092")
    REQUEST_TOPIC = os.getenv("REQUEST_TOPIC", "mydata_prediction_request")
    RESPONSE_TOPIC = os.getenv("RESPONSE_TOPIC", "mydata_prediction_response")

    producer = KafkaProducer(
        bootstrap_servers=BOOTSTRAP,
        value_serializer=lambda v: json.dumps(v).encode("utf-8"),
        key_serializer=lambda k: (k or "").encode("utf-8"),
        linger_ms=0,
    )


    def await_response(key: str, timeout_sec: float = 10.0) -> Optional[Dict[str, Any]]:
        """Espera en Kafka al mensaje de respuesta con la misma key."""
        consumer = KafkaConsumer(
            RESPONSE_TOPIC,
            bootstrap_servers=BOOTSTRAP,
            auto_offset_reset="latest",
            enable_auto_commit=False,
            consumer_timeout_ms=int(timeout_sec * 1000),
            group_id=f"predict-sync-{uuid4()}",
            value_deserializer=lambda v: json.loads(v.decode("utf-8")),
            key_deserializer=lambda k: k.decode("utf-8") if k else None,
        )
        deadline = time.time() + timeout_sec
        try:
            while time.time() < deadline:
                polled = consumer.poll(timeout_ms=500)
                for records in polled.values():
                    for rec in records:
                        if rec.key == key:
                            return rec.value
            return None
        finally:
            consumer.close()

    @app.get("/healthz")
    def healthz():
        return {"ok": True}

    @app.post("/predict")
    async def predict(payload: Dict[str, Any]):
        try:
            key = payload.get("UUID") or ""
            producer.send(REQUEST_TOPIC, key=key, value=payload)
            producer.flush()
            return {"status": "queued", "topic": REQUEST_TOPIC, "key": key}
        except Exception as e:
            raise HTTPException(status_code=500, detail=str(e))


    @app.post("/predict-sync")
    def predict_sync(payload: Dict[str, Any]):
        """
        Encola la petición y espera una respuesta en Kafka (RESPONSE_TOPIC) con la misma UUID.
        Timeout de ~60s.
        """
        try:
            key = payload.get("UUID") or f"req-{uuid4()}"
            producer.send(REQUEST_TOPIC, key=key, value=payload)
            producer.flush()

            resp = await_response(key, timeout_sec=60.0)
            if resp is None:
                return {"status": "queued", "key": key, "detail": "sin respuesta en 60s"}
            return {
                "status": "ok",
                "key": key,
                "prediction": resp.get("prediction"),
                "result": resp,
            }
        except Exception as e:
            raise HTTPException(status_code=500, detail=str(e))


    @app.get("/ready")
    def ready():
        """
        Comprueba si el job de streaming (spark-stream-predict) está vivo consultando su UI.
        """
        try:
            url = "http://spark-stream-predict:4042/api/v1/applications"
            req = urllib.request.Request(url, method="GET")
            with urllib.request.urlopen(req, timeout=3) as resp:
                data = json.loads(resp.read().decode("utf-8"))
            ok = False
            if isinstance(data, list):
                ok = any("analysis" in (app.get("name","").lower()) or "predict" in (app.get("name","").lower()) for app in data)
            return {"ok": ok, "apps": data}
        except Exception as e:
            return {"ok": False, "error": str(e)}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: predict-ingest
  namespace: spark
  labels: { app: predict-ingest }
spec:
  replicas: 1
  selector: { matchLabels: { app: predict-ingest } }
  template:
    metadata: { labels: { app: predict-ingest } }
    spec:
      containers:
        - name: api
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"
            - name: REQUEST_TOPIC
              value: "mydata_prediction_request"
            - name: PYTHONPATH
              value: /app
          command: ["/bin/sh","-lc"]
          args:
            - >
              pip install --no-cache-dir fastapi==0.121.2 uvicorn==0.38.0 kafka-python==2.2.15 &&
              exec uvicorn app:app --host 0.0.0.0 --port 5050 --app-dir /app
          ports:
            - containerPort: 5050
          readinessProbe:
            httpGet: { path: /healthz, port: 5050 }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: ingest-app
---
